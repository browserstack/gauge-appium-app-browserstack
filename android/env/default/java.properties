# Specify an alternate Java home if you want to use a custom version
gauge_java_home =

# IntelliJ and Eclipse out directory will be usually autodetected
# Use the below property if you need to override the build path
gauge_custom_build_path =

# Specify the directory where additional libs are kept.
# Multiple directories can be specified, separated with a comma (,)
gauge_additional_libs = libs/*

# JVM arguments passed to the Gauge Java runner JVM.
# This is the load-bearing wiring for the BrowserStack Java SDK: the -javaagent must be attached
# to the *runner* JVM (Gauge spawns its own JVM separate from the Gradle build JVM, so wiring the
# agent only on the Gradle test task would NOT instrument the Appium driver). The jar is staged at
# build/agent/browserstack-java-sdk.jar by the `copyBrowserStackAgent` Gradle task.
gauge_jvm_args = -javaagent:build/agent/browserstack-java-sdk.jar

# Specify the directory containing java files to be compiled.
# Multiple directories can be specified, separated with a comma (,)
gauge_custom_compile_dir =

# The level at which the objects should be cleared.
# Possible values are suite, spec and scenario. Default value is scenario.
gauge_clear_state_level = scenario
