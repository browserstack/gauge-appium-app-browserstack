# default.properties
# Properties set here are available to the test execution as environment variables.

# The path to the Gauge reports directory. Relative to the project directory or an absolute path.
gauge_reports_dir = reports

# Set as false if Gauge reports should not be overwritten on each execution.
# A new time-stamped directory will be created on each execution.
overwrite_reports = true

# Set to false to disable screenshots on failure in reports.
screenshot_on_failure = true

# The path to the Gauge logs directory. Relative to the project directory or an absolute path.
logs_directory = logs

# Set to true to use multithreading for parallel execution.
enable_multithreading = false

# The path to the Gauge specifications directory.
gauge_specs_dir = specs/bstack-specs

# The default delimiter used to read csv files.
csv_delimiter = ,

# Allows steps to be written in multiline.
allow_multiline_step = false
